name: Build images
on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 5' # 每周五午夜运行

env:
  KERNEL_BRANCH: 6.12.1

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - name: Check out build configurations
        uses: actions/checkout@v4

      - name: Substitute placeholders in configs
        run: |
          find . -type f -name "*.cfg" -exec sed -i "s|HOME|$(echo $HOME)|;s|NPROC|$(nproc)|" {} +

      - name: Install pmbootstrap from git (Latest Master)
        run: |
          # 建议使用 master 分支，以完美兼容最新的 Alpine 仓库变更
          git clone --branch master --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git
          mkdir -p ~/.local/bin
          ln -s "$PWD/pmbootstrap/pmbootstrap.py" ~/.local/bin/pmbootstrap
          pmbootstrap --version

      - name: Set up pmaports (Surgical Integration)
        run: |
          # 1. 初始化会默认拉取官方最新、最干净的主线 pmaports
          echo -e '\n\n' | pmbootstrap init || true
          cd ~/.local/var/pmbootstrap/cache_git/pmaports
          
          git checkout master
          git pull origin master
          
          # 2. 接入自定义的 mainlining 远程仓库
          git remote add mainlining https://github.com/mainlining/pmaports.git
          git fetch mainlining nikroks/alioth
          
          # 3. 【核心修复】手术式精准检出：只拿 alioth 的设备包、内核包和固件包
          # 绝不污染和覆盖 main/ 目录下的核心工具链，彻底根治工具链断层
          git checkout mainlining/nikroks/alioth -- device/testing/device-xiaomi-alioth
          git checkout mainlining/nikroks/alioth -- device/testing/linux-postmarketos-qcom-sm8250-alioth
          git checkout mainlining/nikroks/alioth -- device/testing/firmware-xiaomi-alioth || true

      - name: Clone kernel sources
        run: |
          git clone https://github.com/mainlining/linux.git --single-branch --branch nikroks/alioth --depth 1 ./linux

      - name: Choose any SM8250 device in pmbootstrap to build kernel
        run: |
          cp xiaomi-alioth.cfg ~/.config/pmbootstrap_v3.cfg

      - name: Compile kernel with envkernel
        run: |
          cd linux
          shopt -s expand_aliases
          source ../pmbootstrap/helpers/envkernel.sh
          make defconfig sm8250.config
          make -j$(nproc)
          env -u CI pmbootstrap build --envkernel linux-postmarketos-qcom-sm8250-alioth

      - name: Create artifact directory
        run: |
          mkdir out
          
      - name: Build xiaomi-alioth
        run: |
          cp xiaomi-alioth.cfg ~/.config/pmbootstrap_v3.cfg
          # 此时安装阶段会直接下载官方预编译好的最新 boot-deploy 二进制包，秒过！
          env -u CI pmbootstrap install --password 147147
          env -u CI pmbootstrap export
          cp /tmp/postmarketOS-export/boot.img out/boot-xiaomi-tianma-alioth.img
          cp /tmp/postmarketOS-export/xiaomi-alioth.img out/rootfs-xiaomi-alioth.img

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xiaomi-alioth
          path: out/*-alioth.img*
          retention-days: 7
